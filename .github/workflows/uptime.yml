name: Uptime check

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:        # manual button in Actions tab

permissions:
  issues: write
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /up
        id: ping
        run: |
          set +e
          for attempt in 1 2 3; do
            HTTP=$(curl -sS -L -o /tmp/body -w "%{http_code}" --max-time 20 https://knxprofessionals.org/this-does-not-exist)
            if [ "$HTTP" = "200" ]; then
              echo "✅ Site UP (HTTP $HTTP)"
              exit 0
            fi
            echo "Attempt $attempt: HTTP $HTTP — retrying in 10s"
            sleep 10
          done
          echo "status=$HTTP" >> "$GITHUB_OUTPUT"
          BODY_PREVIEW=$(head -c 500 /tmp/body | tr '\n' ' ')
          echo "body_preview=$BODY_PREVIEW" >> "$GITHUB_OUTPUT"
          echo "❌ Site DOWN — last status: $HTTP"
          exit 1

      - name: Open alert issue (or comment on existing one)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 knxprofessionals.org appears DOWN';
            const body  = `Uptime check failed at ${new Date().toISOString()}.\n\n` +
                          `Last HTTP status: \`${{ steps.ping.outputs.status }}\`\n\n` +
                          `Response body preview:\n\`\`\`\n${{ steps.ping.outputs.body_preview }}\n\`\`\`\n\n` +
                          `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'uptime-alert',
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                labels: ['uptime-alert'],
              });
            }
